<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어_1 단어장 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #ffeef2;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw =\"#ffdde5\" fill-opacity=\"0.5\"><path d=\"M0 0h20v20H0z society20 20h20v20H20zM20 0h20v20H20zM0 20h20v20H0z\"/></g></g></svg>');
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            color: #5d4037;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-container {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            background-color: white;
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            border: 2px solid #ffb6c1;
        }

        .filter-label {
            font-size: 20px;
            font-weight: bold;
            color: #ff69b4;
        }

        select {
            padding: 8px 20px;
            font-size: 18px;
            border-radius: 25px;
            border: 2px solid #ffb6c1;
            background-color: #fff0f5;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            color: #c71585;
            appearance: none;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDYwIDYwIj48cGF0aCBkPSJNNyAxMGw1IDUgNS01eiIgZmlsbD0iI2NmMTU4NSIvPjwvc3ZnPg==');
            background-repeat: no-repeat;
            background-position: right 10px center;
            padding-right: 40px;
        }
        
        select:focus { outline: none; }

        .toggle-group {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .card-container {
            width: 380px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 20px;
            border: 4px solid #b39ddb;
            box-shadow: 0 12px 25px rgba(179, 157, 219, 0.5);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            background-color: white;
            padding: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card-front {
            z-index: 2;
            background-color: #fff5f8;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDYwIDYwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmRkZTUiIGZpbGwtb3BhY2l0eT0iMC4zIj48cGF0aCBkPSJNMzAgMEgyMHYxMGgxMFYwek0xMCAwSDB2MTBoMTBWMHpNMCAxMGgxMHYxMEgwVjEwek0xMCAyMGgxMHYxMEgxMFYyMHpNMjAgMzBoMTB2MTBIMjBWMzAwek0zMCA0MGgxMHYxMEgzMFY0MHpNMzAgMjBoMTB2MTBIMzBWMjB6TTQwIDEwaDEwdjEwSDQwVjEwek01MCAwaDEwdjEwSDU5VjB6TTQwIDMwaDEwdjEwSDQwVjMwek01MCAyMGgxMHYxMEg1OVYyMHpNMjAgMTBoMTB2MTBIMjBWMTB6TTMwIDMwaDEwdjEwSDMwVjMwek0xMCA0MGgxMHYxMEgxMFY0MHpNMzAzeDEwdjEwSDBWMwVjMwek00MCA1MGgxMHYxMEg0MFY1MHpNMjAgNTBoMTB2MTBIMjBWNTB6TTAgNTBoMTB2MTBIMFY1MHoiLz+PC9nPjwvZz48L3N2Zz4=');
        }

        .card-back { transform: rotateY(180deg); z-index: 1; background-color: #fffdeb; }

        .chapter-badge {
            position: absolute;
            top: 15px;
            left: 20px;
            background-color: #ffb6c1;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 16px;
            color: white;
            font-weight: bold;
        }
        .chapter-badge::before { content: '🎀 '; }

        .audio-btn {
            position: absolute;
            top: 10px;
            left: 90px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            box-shadow: none !important;
        }

        .unknown-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 36px;
            background: none;
            border: none;
            cursor: pointer;
            box-shadow: none !important;
            z-index: 10;
            transition: transform 0.2s;
        }
        .unknown-btn:hover { transform: scale(1.2); }

        .character-icon { position: absolute; bottom: 10px; right: 15px; font-size: 40px; opacity: 0.8; }

        .hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 68px;
            font-weight: 700;
            color: #d81b60;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px white, 4px 4px 0px rgba(216, 27, 96, 0.2);
            text-align: center;
        }

        .pinyin {
            font-family: 'Roboto', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #880e4f;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 4px 14px;
            border-radius: 12px;
        }

        .meaning-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        /* 품사 배지 스타일 */
        .part-badge {
            font-size: 18px;
            background-color: #e8eaf6;
            color: #3f51b5;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
            border: 1px solid #c5cae9;
        }

        .meaning { font-size: 32px; font-weight: bold; color: #bf360c; }
        
        .example {
            font-size: 18px; color: #5d4037; text-align: center; line-height: 1.6;
            background-color: rgba(255, 255, 255, 0.8); padding: 10px; border-radius: 10px; max-width: 90%;
        }

        .progress-container {
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.7); padding: 5px 15px; border-radius: 20px;
        }
        .progress-bar-bg { width: 150px; height: 10px; background-color: #e0e0e0; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: #ff69b4; width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 18px; color: #c71585; font-weight: bold; }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px;}

        button {
            padding: 12px 24px; font-size: 22px; font-family: 'Gaegu', cursive; font-weight: bold;
            border: none; border-radius: 30px; cursor: pointer; transition: all 0.2s; box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        button:active { transform: translateY(2px); }

        .nav-btn { background-color: #b3e5fc; color: #01579b; border: 2px solid #81d4fa; }
        .shuffle-btn { background-color: #ffcdd2; color: #b71c1c; border: 2px solid #ef9a9a; }
        
        .autoplay-btn { background-color: #ffe082; color: #e65100; border: 2px solid #ffd54f; }
        .autoplay-btn.active { background-color: #ffb300; color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (max-width: 420px) {
            .card-container { width: 95%; height: 250px; }
            .hanzi { font-size: 56px; }
            button { font-size: 18px; padding: 10px 18px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="filter-container">
            <span class="filter-label">📂 단어 범위 선택:</span>
            <select id="chapter-select" onchange="changeCategory()">
                <option value="all">🌟 전체 과 보기</option>
                <option value="1">🌸 제 1 과</option>
                <option value="2">🌸 제 2 과</option>
                <option value="3">🌸 제 3 과</option>
                <option value="4">🌸 제 4 과</option>
                <option value="5">🌸 제 5 과</option>
                <option value="unknown">🖤 모르는 단어만 (오답노트)</option>
            </select>
        </div>

        <div class="toggle-group">
            <label class="toggle-item"><input type="checkbox" id="auto-tts" checked> 🔊 넘길 때 자동 발음</label>
        </div>
    </div>

    <div class="card-container">
        <button class="audio-btn" onclick="speakCurrentWord(event)">🔊</button>
        <button class="unknown-btn" onclick="toggleUnknown(event)" id="unknown-heart">🤍</button>
        
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <span class="chapter-badge" id="front-badge">-과</span>
                <div class="hanzi" id="hanzi">로딩 중.. ✨</div>
                <div class="pinyin" id="pinyin">loading</div>
                <div class="character-icon">🐰🎀</div>
            </div>
            <div class="card-face card-back">
                <span class="chapter-badge" id="back-badge">-과</span>
                <div class="meaning-box">
                    <span class="part-badge" id="part" style="display:none;">품사</span>
                    <div class="meaning" id="meaning">뜻</div>
                </div>
                <div class="example" id="example">예문</div>
                <div class="character-icon">🐶🍮</div>
            </div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar-fill"></div></div>
        <div class="progress-text" id="progress-text">0 / 0</div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">👈 이전</button>
        <button class="autoplay-btn" id="autoplay-btn" onclick="toggleAutoplay()">⏱️ 자동 재생</button>
        <button class="shuffle-btn" onclick="shuffleCards()">🎲 섞기</button>
        <button class="nav-btn" onclick="nextCard()">다음 👉</button>
    </div>

    <script>
        // ==========================================
        // 🚀 구글 스프레드시트 실시간 연동 설정 완료!
        // ==========================================
        const SPREADSHEET_ID = '18D1sxEjb7qD4DudFmrZziQDZ0HK-F1V-8Z3V-9WxoDw';
        const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

        let totalWordData = [];
        let unknownWordIds = JSON.parse(localStorage.getItem('sanrioUnknownWords')) || [];
        let currentFilteredData = [];
        let currentIndex = 0;
        let autoplayTimer = null;

        const cardElement = document.getElementById('card');
        const hanziElement = document.getElementById('hanzi');
        const pinyinElement = document.getElementById('pinyin');
        const partElement = document.getElementById('part');
        const meaningElement = document.getElementById('meaning');
        const exampleElement = document.getElementById('example');
        const progressElement = document.getElementById('progress-text');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const heartElement = document.getElementById('unknown-heart');
        const frontBadge = document.getElementById('front-badge');
        const backBadge = document.getElementById('back-badge');
        const autoplayBtn = document.getElementById('autoplay-btn');

        // 구글 시트에서 CSV 데이터 원격 호출하는 함수
        async function loadWordData() {
            try {
                const response = await fetch(SPREADSHEET_URL);
                const text = await response.text();
                
                // CSV 파싱 작업
                const lines = text.split('\n').map(line => {
                    // 구글 CSV 특유의 따옴표 정제 작업
                    return line.split('","').map(cell => cell.replace(/^"|"$/g, '').trim());
                });

                // 헤더(1번째 줄) 제외하고 데이터 가공
                const words = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i];
                    if (row.length >= 5 && row[2]) { // 한자가 있는 유효 데이터만
                        words.push({
                            id: parseInt(row[0]) || i,
                            chapter: row[1] || "1",
                            hanzi: row[2],
                            pinyin: row[3] || "",
                            meaning: row[4] || "",
                            part: row[5] || "",      // 새롭게 추가한 품사(Part) 영역
                            example: row[6] || ""
                        });
                    }
                }
                
                totalWordData = words;
                changeCategory();
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                hanziElement.textContent = "연동 실패";
                meaningElement.textContent = "구글 시트 공유 설정을 다시 확인해 주세요 💧";
            }
        }

        function changeCategory() {
            const selectedValue = document.getElementById('chapter-select').value;
            if (selectedValue === "all") { currentFilteredData = [...totalWordData]; }
            else if (selectedValue === "unknown") { currentFilteredData = totalWordData.filter(word => unknownWordIds.includes(word.id)); }
            else { currentFilteredData = totalWordData.filter(word => String(word.chapter) === selectedValue); }
            currentIndex = 0;
            stopAutoplay();
            updateCardContent();
        }

        function updateCardContent() {
            if (currentFilteredData.length === 0) {
                hanziElement.textContent = "단어 없음";
                pinyinElement.textContent = "";
                meaningElement.textContent = "단어가 없어요💧";
                partElement.style.display = "none";
                exampleElement.textContent = "구글 시트에 단어를 채우거나 범위를 바꿔보세요.";
                progressElement.textContent = "0 / 0";
                progressBarFill.style.width = '0%';
                heartElement.style.display = "none";
                return;
            }
            
            heartElement.style.display = "block";
            const currentWord = currentFilteredData[currentIndex];
            
            hanziElement.textContent = currentWord.hanzi;
            pinyinElement.textContent = currentWord.pinyin;
            meaningElement.textContent = currentWord.meaning;
            exampleElement.textContent = currentWord.example;
            frontBadge.textContent = currentWord.chapter + "과";
            backBadge.textContent = currentWord.chapter + "과";

            // 품사가 등록되어 있으면 예쁘게 배지로 표시하기
            if (currentWord.part) {
                partElement.textContent = currentWord.part;
                partElement.style.display = "inline-block";
            } else {
                partElement.style.display = "none";
            }

            heartElement.textContent = unknownWordIds.includes(currentWord.id) ? "💖" : "🤍";
            
            const total = currentFilteredData.length;
            const current = currentIndex + 1;
            progressElement.textContent = `${current} / ${total}`;
            progressBarFill.style.width = `${(current / total) * 100}%`;

            if (cardElement.classList.contains('flipped')) { cardElement.classList.remove('flipped'); }

            if (document.getElementById('auto-tts').checked) {
                setTimeout(() => speak(currentWord.hanzi), 300);
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakCurrentWord(event) {
            if(event) event.stopPropagation();
            if (currentFilteredData.length === 0) return;
            const currentWord = currentFilteredData[currentIndex];
            if (cardElement.classList.contains('flipped')) {
                speak(currentWord.example);
            } else {
                speak(currentWord.hanzi);
            }
        }

        function flipCard() {
            cardElement.classList.toggle('flipped');
            if (cardElement.classList.contains('flipped') && document.getElementById('auto-tts').checked) {
                const currentWord = currentFilteredData[currentIndex];
                setTimeout(() => speak(currentWord.example), 500);
            }
        }

        function toggleAutoplay() {
            if (autoplayTimer) { stopAutoplay(); } 
            else {
                if (currentFilteredData.length === 0) return;
                autoplayBtn.classList.add('active');
                autoplayBtn.textContent = "⏸️ 재생 중..";
                
                autoplayTimer = setInterval(() => {
                    if (!cardElement.classList.contains('flipped')) {
                        flipCard();
                    } else {
                        nextCard();
                    }
                }, 4000); 
            }
        }

        function stopAutoplay() {
            if (autoplayTimer) {
                clearInterval(autoplayTimer);
                autoplayTimer = null;
                autoplayBtn.classList.remove('active');
                autoplayBtn.textContent = "⏱️ 자동 재생";
            }
        }

        function toggleUnknown(event) {
            event.stopPropagation();
            if (currentFilteredData.length === 0) return;
            const currentWord = currentFilteredData[currentIndex];
            const wordId = currentWord.id;

            if (unknownWordIds.includes(wordId)) {
                unknownWordIds = unknownWordIds.filter(id => id !== wordId);
                heartElement.textContent = "🤍";
            } else {
                unknownWordIds.push(wordId);
                heartElement.textContent = "💖";
            }
            localStorage.setItem('sanrioUnknownWords', JSON.stringify(unknownWordIds));
            if (document.getElementById('chapter-select').value === "unknown") { changeCategory(); }
        }

        function prevCard() {
            if (currentFilteredData.length <= 1) return;
            currentIndex = (currentIndex - 1 + currentFilteredData.length) % currentFilteredData.length;
            updateCardContent();
        }

        function nextCard() {
            if (currentFilteredData.length <= 1) return;
            currentIndex = (currentIndex + 1) % currentFilteredData.length;
            updateCardContent();
        }

        function shuffleCards() {
            if (currentFilteredData.length <= 1) return;
            for (let i = currentFilteredData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentFilteredData[i], currentFilteredData[j]] = [currentFilteredData[j], currentFilteredData[i]];
            }
            currentIndex = 0;
            updateCardContent();
        }

        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') { event.preventDefault(); flipCard(); stopAutoplay(); }
            else if (event.code === 'ArrowLeft') { prevCard(); stopAutoplay(); }
            else if (event.code === 'ArrowRight') { nextCard(); stopAutoplay(); }
        });

        // 웹사이트 시작 시 원격 구글 시트 데이터 로드 시작
        loadWordData();
    </script>
</body>
</html>
