<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어 1 _단어장 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #ffeef2;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmRkZTUiIGZpbGwtb3BhY2l0eT0iMC41Ij48cGF0aCBkPSJNMCAwaDIwdjIwSDB6bTIwIDIwaDIwdjIwSDIwek0yMCAwaDIwdjIwSDIwek0wIDIwaDIwdjIwSDB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            color: #5d4037;
        }

        /* 상단 필터 영역 */
        .filter-container {
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            background-color: white;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            border: 2px solid #ffb6c1;
        }

        .filter-label {
            font-size: 20px;
            font-weight: bold;
            color: #ff69b4;
        }

        select {
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 25px;
            border: 2px solid #ffb6c1;
            background-color: #fff0f5;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            color: #c71585;
            appearance: none;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBkPSJNNyAxMGw1IDUgNS01eiIgZmlsbD0iI2NmMTU4NSIvPjwvc3ZnPg==');
            background-repeat: no-repeat;
            background-position: right 10px center;
            padding-right: 40px;
        }
        
        select:focus {
            outline: none;
            border-color: #ff69b4;
        }

        /* 카드 컨테이너 */
        .card-container {
            width: 380px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 25px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 20px;
            border: 4px solid #b39ddb;
            box-shadow: 0 12px 25px rgba(179, 157, 219, 0.5);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            background-color: white;
            padding: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card-front {
            z-index: 2;
            background-color: #fff5f8;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDYwIDYwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmRkZTUiIGZpbGwtb3BhY2l0eT0iMC4zIj48cGF0aCBkPSJNMzAgMEgyMHYxMGgxMFYwek0xMCAwSDB2MTBoMTBWMHpNMCAxMGgxMHYxMEgwVjEwek0xMCAyMGgxMHYxMEgxMFYyMHpNMjAgMzBoMTB2MTBIMjBWMzAwek0zMCA0MGgxMHYxMEgzMFY0MHpNMzAgMjBoMTB2MTBIMzBWMjB6TTQwIDEwaDEwdjEwSDQwVjEwek01MCAwaDEwdjEwSDU5VjB6TTQwIDMwaDEwdjEwSDQwVjMwek01MCAyMGgxMHYxMEg1OVYyMHpNMjAgMTBoMTB2MTBIMjBWMTB6TTMwIDMwaDEwdjEwSDMwVjMwek0xMCA0MGgxMHYxMEgxMFY0MHpNMwAzeDEwdjEwSDBWMwVjMwek00MCA1MGgxMHYxMEg0MFY1MHpNMjAgNTBoMTB2MTBIMjBWNTB6TTAgNTBoMTB2MTBIMFY1MHoiLz+PC9nPjwvZz48L3N2Zz4=');
        }

        .card-back {
            transform: rotateY(180deg);
            z-index: 1;
            background-color: #fffdeb;
        }

        .chapter-badge {
            position: absolute;
            top: 15px;
            left: 20px;
            background-color: #ffb6c1;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 16px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .chapter-badge::before { content: '🎀'; }

        .unknown-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 36px;
            background: none;
            border: none;
            cursor: pointer;
            box-shadow: none !important;
            padding: 0;
            z-index: 10;
            transition: transform 0.2s;
        }
        
        .unknown-btn:hover { transform: scale(1.2) rotate(10deg); }

        .character-icon {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 40px;
            opacity: 0.8;
        }

        .hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 68px;
            font-weight: 700;
            color: #d81b60;
            margin-bottom: 8px;
            word-break: break-all;
            text-align: center;
            text-shadow: 2px 2px 0px white, 4px 4px 0px rgba(216, 27, 96, 0.2);
        }

        /* [피드백 반영] 병음용 폰트를 균일한 고딕(Roboto)으로 교체 및 디자인 다듬기 */
        .pinyin {
            font-family: 'Roboto', 'Noto Sans KR', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #880e4f;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 4px 14px;
            border-radius: 12px;
            letter-spacing: 0.5px; /* 균일하고 깔끔한 자간 설정 */
            box-shadow: 0 2px 5px rgba(216, 27, 96, 0.05);
        }

        .meaning {
            font-size: 32px;
            font-weight: bold;
            color: #bf360c;
            margin-bottom: 15px;
            text-shadow: 1px 1px 0px white;
        }

        .example {
            font-size: 18px;
            color: #5d4037;
            text-align: center;
            line-height: 1.6;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 10px;
            max-width: 90%;
        }

        /* 하단 진행도 및 진행바 */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        .progress-bar-bg {
            width: 150px;
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background-color: #ff69b4;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 18px;
            color: #c71585;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* [피드백 반영] 하단 조작 버튼들의 글씨 크기 확대 (18px -> 22px) 및 패딩 조절 */
        button {
            padding: 14px 28px;
            font-size: 22px; 
            font-family: 'Gaegu', cursive;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .nav-btn {
            background-color: #b3e5fc;
            color: #01579b;
            border: 2px solid #81d4fa;
        }
        
        .nav-btn:hover { background-color: #81d4fa; }

        .shuffle-btn {
            background-color: #ffcdd2;
            color: #b71c1c;
            border: 2px solid #ef9a9a;
        }
        
        .shuffle-btn:hover { background-color: #ef9a9a; }

        @media (max-width: 420px) {
            .card-container { width: 95%; height: 250px; }
            .hanzi { font-size: 56px; }
            .meaning { font-size: 28px; }
            .pinyin { font-size: 20px; }
            .example { font-size: 16px; }
            button { font-size: 18px; padding: 12px 22px; } /* 모바일에서도 적절히 크게 유지 */
        }
    </style>
</head>
<body>

    <div class="filter-container">
        <span class="filter-label">📂 단어 범위 선택:</span>
        <select id="chapter-select" onchange="changeCategory()">
            <option value="all">🌟 전체 과 보기</option>
            <option value="1">🌸 제 1 과</option>
            <option value="2">🌸 제 2 과</option>
            <option value="3">🌸 제 3 과</option>
            <option value="unknown">🖤 모르는 단어만 (쿠로미 오답노트)</option>
        </select>
    </div>

    <div class="card-container">
        <button class="unknown-btn" onclick="toggleUnknown(event)" id="unknown-heart">🤍</button>
        
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <span class="chapter-badge" id="front-badge">1과</span>
                <div class="hanzi" id="hanzi">加载중..</div>
                <div class="pinyin" id="pinyin">pinyin</div>
                <div class="character-icon">🐰🎀</div>
            </div>
            <div class="card-face card-back">
                <span class="chapter-badge" id="back-badge">1과</span>
                <div class="meaning" id="meaning">뜻</div>
                <div class="example" id="example">예문</div>
                <div class="character-icon">🐶🍮</div>
            </div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 0</div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">👈 이전 카드</button>
        <button class="shuffle-btn" onclick="shuffleCards()">🎲 무작위 섞기</button>
        <button class="nav-btn" onclick="nextCard()">다음 카드 👉</button>
    </div>

    <script>
        // 단어 데이터베이스
        const totalWordData = [
            { id: 1, chapter: "1", hanzi: "你好", pinyin: "nǐ hǎo", meaning: "안녕하세요", example: "你好！很高兴认识你。" },
            { id: 2, chapter: "1", hanzi: "谢谢", pinyin: "xièxie", meaning: "감사합니다", example: "谢谢你的帮助。" },
            { id: 3, chapter: "2", hanzi: "学习", pinyin: "xuéxí", meaning: "공부하다", example: "我正在学习汉语。" },
            { id: 4, chapter: "2", hanzi: "朋友", pinyin: "péngyou", meaning: "친구", example: "他是我的好朋友。" },
            { id: 5, chapter: "3", hanzi: "苹果", pinyin: "píngguǒ", meaning: "사과", example: "我很喜欢吃苹果。" },
            { id: 6, chapter: "3", hanzi: "电脑", pinyin: "diànnǎo", meaning: "컴퓨터", example: "这台电脑是谁의？" },
            { id: 7, chapter: "1", hanzi: "再见", pinyin: "zàijiàn", meaning: "안녕히 계세요", example: "明天见，再见！" }
        ];

        let unknownWordIds = JSON.parse(localStorage.getItem('sanrioUnknownWords')) || [];
        let currentFilteredData = [...totalWordData];
        let currentIndex = 0;

        const cardElement = document.getElementById('card');
        const hanziElement = document.getElementById('hanzi');
        const pinyinElement = document.getElementById('pinyin');
        const meaningElement = document.getElementById('meaning');
        const exampleElement = document.getElementById('example');
        const progressElement = document.getElementById('progress-text');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const heartElement = document.getElementById('unknown-heart');
        const frontBadge = document.getElementById('front-badge');
        const backBadge = document.getElementById('back-badge');

        function changeCategory() {
            const selectedValue = document.getElementById('chapter-select').value;
            if (selectedValue === "all") {
                currentFilteredData = [...totalWordData];
            } else if (selectedValue === "unknown") {
                currentFilteredData = totalWordData.filter(word => unknownWordIds.includes(word.id));
            } else {
                currentFilteredData = totalWordData.filter(word => word.chapter === selectedValue);
            }
            currentIndex = 0;
            updateCardContent();
        }

        function updateCardContent() {
            if (currentFilteredData.length === 0) {
                hanziElement.textContent = "단어 없음";
                hanziElement.style.fontSize = '40px';
                pinyinElement.textContent = "";
                meaningElement.textContent = "선택한 조건에 단어가 없어요💧";
                exampleElement.textContent = "오답 노트를 채워보거나 다른 과를 선택해보세요.";
                progressElement.textContent = "0 / 0";
                progressBarFill.style.width = '0%';
                heartElement.style.display = "none";
                frontBadge.textContent = "-";
                backBadge.textContent = "-";
                return;
            }
            
            hanziElement.style.fontSize = ''; 
            heartElement.style.display = "block";
            const currentWord = currentFilteredData[currentIndex];
            
            hanziElement.textContent = currentWord.hanzi;
            pinyinElement.textContent = currentWord.pinyin;
            meaningElement.textContent = currentWord.meaning;
            exampleElement.textContent = currentWord.example;
            frontBadge.textContent = currentWord.chapter + "과";
            backBadge.textContent = currentWord.chapter + "과";

            if (unknownWordIds.includes(currentWord.id)) {
                heartElement.textContent = "💖";
            } else {
                heartElement.textContent = "🤍";
            }

            const total = currentFilteredData.length;
            const current = currentIndex + 1;
            progressElement.textContent = `${current} / ${total}`;
            progressBarFill.style.width = `${(current / total) * 100}%`;

            if (cardElement.classList.contains('flipped')) {
                cardElement.classList.remove('flipped');
            }
        }

        function flipCard() { cardElement.classList.toggle('flipped'); }

        function toggleUnknown(event) {
            event.stopPropagation();
            if (currentFilteredData.length === 0) return;

            const currentWord = currentFilteredData[currentIndex];
            const wordId = currentWord.id;

            if (unknownWordIds.includes(wordId)) {
                unknownWordIds = unknownWordIds.filter(id => id !== wordId);
                heartElement.textContent = "🤍";
            } else {
                unknownWordIds.push(wordId);
                heartElement.textContent = "💖";
            }

            localStorage.setItem('sanrioUnknownWords', JSON.stringify(unknownWordIds));

            if (document.getElementById('chapter-select').value === "unknown") {
                changeCategory();
            }
        }

        function prevCard() {
            if (currentFilteredData.length <= 1) return;
            currentIndex = (currentIndex - 1 + currentFilteredData.length) % currentFilteredData.length;
            updateCardContent();
        }

        function nextCard() {
            if (currentFilteredData.length <= 1) return;
            currentIndex = (currentIndex + 1) % currentFilteredData.length;
            updateCardContent();
        }

        function shuffleCards() {
            if (currentFilteredData.length <= 1) return;
            for (let i = currentFilteredData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentFilteredData[i], currentFilteredData[j]] = [currentFilteredData[j], currentFilteredData[i]];
            }
            currentIndex = 0;
            updateCardContent();
        }

        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') {
                event.preventDefault();
                flipCard();
            } else if (event.code === 'ArrowLeft') {
                prevCard();
            } else if (event.code === 'ArrowRight') {
                nextCard();
            }
        });

        changeCategory();
    </script>
</body>
</html>
