<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <style>
        /* [중요] 기존 스타일 시트에 아래 내용을 추가/수정해주세요 */
        .game-item { /* 기존 스타일에 추가 */
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; padding: 5px; text-align: center;
        }
        .game-pinyin { font-size: 12px; color: #880e4f; margin-top: 4px; }
    </style>
</head>
<body>

    <script>
        // 변수 추가
        let totalWordData = [], currentFilteredData = [], remainingData = [], selectedGameItems = [], matchedCount = 0;

        // [수정] 데이터 로드 및 카테고리 변경 시 remainingData 초기화
        function changeCategory() {
            const val = document.getElementById('chapter-select').value;
            // ... (기존 필터링 로직)
            remainingData = []; // 범위 변경 시 게임 데이터 초기화
            updateCardContent();
        }

        // [핵심 수정] 매칭 게임 로직
        function initMatchingGame() {
            // 처음 시작하거나, 남은 게 없으면 현재 필터링된 데이터에서 가져오기
            if (remainingData.length === 0) {
                remainingData = [...currentFilteredData];
            }

            // 남은 단어 중 랜덤하게 최대 4쌍(8개) 선택
            const pool = [...remainingData].sort(() => 0.5 - Math.random()).slice(0, 4);

            if (pool.length < 2) {
                document.getElementById('game-status-message').textContent = "🎉 모두 맞췄어요!";
                return;
            }

            let pieces = [];
            pool.forEach(w => {
                pieces.push({id: w.id, text: w.hanzi, pinyin: w.pinyin, type: 'h'}, {id: w.id, text: w.meaning, pinyin: '', type: 'm'});
            });
            pieces.sort(() => 0.5 - Math.random());

            const g = document.getElementById('game-grid-container');
            const status = document.getElementById('game-status-message');
            g.innerHTML = '';
            status.textContent = "짝을 맞추세요!";

            pieces.forEach(p => {
                const div = document.createElement('div');
                div.className = 'game-item';
                // 병음 표시 추가
                div.innerHTML = `<div>${p.text}</div>${p.pinyin ? `<div class="game-pinyin">${p.pinyin}</div>` : ''}`;
                
                div.onclick = () => {
                    if (div.classList.contains('matched') || div.classList.contains('selected')) return;

                    div.classList.add('selected');
                    selectedGameItems.push({div, id: p.id, type: p.type});

                    if (selectedGameItems.length === 2) {
                        const [item1, item2] = selectedGameItems;

                        if (item1.id === item2.id && item1.type !== item2.type) {
                            // 맞춘 경우
                            item1.div.classList.add('matched');
                            item2.div.classList.add('matched');
                            
                            // 남은 데이터에서 삭제
                            remainingData = remainingData.filter(w => w.id !== item1.id);
                            
                            if (remainingData.length === 0) status.textContent = "🎉 대성공! 다 맞췄어요!";
                        } else {
                            // 틀린 경우
                            setTimeout(() => {
                                item1.div.classList.remove('selected');
                                item2.div.classList.remove('selected');
                            }, 500);
                        }
                        selectedGameItems = [];
                    }
                };
                g.appendChild(div);
            });
        }

        // [재시작 함수]
        function restartGame() {
            initMatchingGame();
        }

        // 기존 loadWordData 등 나머지 함수 유지...
    </script>
</body>
</html>
