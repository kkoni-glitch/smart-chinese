<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #ffeef2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            color: #5d4037;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-container {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            background-color: white;
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            border: 2px solid #ffb6c1;
        }

        .filter-label {
            font-size: 20px;
            font-weight: bold;
            color: #ff69b4;
        }

        select {
            padding: 8px 20px;
            font-size: 18px;
            border-radius: 25px;
            border: 2px solid #ffb6c1;
            background-color: #fff0f5;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            color: #c71585;
            outline: none;
        }

        .options-outer-container {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .toggle-group {
            display: flex;
            background: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ffb6c1;
            align-items: center;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.3);
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #ff69b4;
        }

        .game-trigger-btn {
            background-color: #d1c4e9;
            color: #4a148c;
            border: 2px solid #b39ddb;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(179, 157, 219, 0.4);
        }
        .game-trigger-btn:hover {
            background-color: #b39ddb;
            color: white;
        }

        .card-container {
            width: 380px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 20px;
            border: 4px solid #b39ddb;
            box-shadow: 0 12px 25px rgba(179, 157, 219, 0.5);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            background-color: white;
            padding: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card-front { z-index: 2; background-color: #fff5f8; }
        .card-back { transform: rotateY(180deg); z-index: 1; background-color: #fffdeb; }

        .chapter-badge {
            position: absolute;
            top: 15px;
            left: 20px;
            background-color: #ffb6c1;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 16px;
            color: white;
            font-weight: bold;
        }
        .chapter-badge::before { content: '🎀 '; }

        .audio-btn {
            position: absolute;
            top: 10px;
            left: 95px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .unknown-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 36px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }
        .unknown-btn:hover { transform: scale(1.1); }

        .character-icon { position: absolute; bottom: 10px; right: 15px; font-size: 40px; opacity: 0.8; }

        .hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 68px;
            font-weight: 700;
            color: #d81b60;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px white;
            text-align: center;
        }

        .pinyin {
            font-family: 'Roboto', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #880e4f;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 4px 14px;
            border-radius: 12px;
            letter-spacing: 0.5px;
        }

        .meaning-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .part-badge {
            font-size: 18px;
            background-color: #e8eaf6;
            color: #3f51b5;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
            border: 1px solid #c5cae9;
        }

        .meaning { font-size: 32px; font-weight: bold; color: #bf360c; }
        
        .example {
            font-size: 18px; color: #5d4037; text-align: center; line-height: 1.6;
            background-color: rgba(255, 255, 255, 0.8); padding: 10px; border-radius: 10px; max-width: 90%;
        }

        .progress-container {
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.7); padding: 5px 15px; border-radius: 20px;
        }
        .progress-bar-bg { width: 150px; height: 10px; background-color: #e0e0e0; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: #ff69b4; width: 0%; transition: width 0.3s; }
        
        .progress-text { 
            font-size: 18px; color: #c71585; font-weight: bold; cursor: pointer;
            padding: 2px 8px; border-radius: 10px; background-color: #fff0f5; transition: background 0.2s;
        }
        .progress-text:hover { background-color: #ffb6c1; color: white; }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px;}

        button {
            padding: 12px 24px; font-size: 22px; font-family: 'Gaegu', cursive; font-weight: bold;
            border: none; border-radius: 30px; cursor: pointer; transition: all 0.2s; box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        .nav-btn { background-color: #b3e5fc; color: #01579b; border: 2px solid #81d4fa; }
        .shuffle-btn { background-color: #ffcdd2; color: #b71c1c; border: 2px solid #ef9a9a; }
        .autoplay-btn { background-color: #ffe082; color: #e65100; border: 2px solid #ffd54f; }
        .autoplay-btn.active { background-color: #ffb300; color: white; }

        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.4);
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
