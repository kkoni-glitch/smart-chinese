<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #ffeef2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            color: #5d4037;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-container {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            background-color: white;
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            border: 2px solid #ffb6c1;
        }

        .filter-label {
            font-size: 20px;
            font-weight: bold;
            color: #ff69b4;
        }

        select {
            padding: 8px 20px;
            font-size: 18px;
            border-radius: 25px;
            border: 2px solid #ffb6c1;
            background-color: #fff0f5;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            color: #c71585;
            outline: none;
        }

        .options-outer-container {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .toggle-group {
            display: flex;
            background: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ffb6c1;
            align-items: center;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.3);
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #ff69b4;
        }

        .game-trigger-btn {
            background-color: #d1c4e9;
            color: #4a148c;
            border: 2px solid #b39ddb;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(179, 157, 219, 0.4);
        }
        .game-trigger-btn:hover {
            background-color: #b39ddb;
            color: white;
        }

        .card-container {
            width: 380px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 20px;
            border: 4px solid #b39ddb;
            box-shadow: 0 12px 25px rgba(179, 157, 219, 0.5);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            background-color: white;
            padding: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card-front { z-index: 2; background-color: #fff5f8; }
        .card-back { transform: rotateY(180deg); z-index: 1; background-color: #fffdeb; }

        .chapter-badge {
            position: absolute;
            top: 15px;
            left: 20px;
            background-color: #ffb6c1;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 16px;
            color: white;
            font-weight: bold;
        }
        .chapter-badge::before { content: '🎀 '; }

        .audio-btn {
            position: absolute;
            top: 10px;
            left: 95px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .unknown-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 36px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }
        .unknown-btn:hover { transform: scale(1.1); }

        .character-icon { position: absolute; bottom: 10px; right: 15px; font-size: 40px; opacity: 0.8; }

        .hanzi {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 68px;
            font-weight: 700;
            color: #d81b60;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px white;
            text-align: center;
        }
