<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #ffeef2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            color: #5d4037;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-container {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            background-color: white;
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            border: 2px solid #ffb6c1;
        }

        .options-outer-container {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .toggle-group {
            display: flex;
            background: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ffb6c1;
            align-items: center;
        }

        .game-trigger-btn {
            background-color: #d1c4e9;
            color: #4a148c;
            border: 2px solid #b39ddb;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .card-container {
            width: 350px;
            height: 250px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            position: relative;
            border-radius: 20px;
            border: 4px solid #b39ddb;
            box-shadow: 0 10px 20px rgba(179, 157, 219, 0.3);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            background-color: white;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fffdeb;
        }

        .hanzi {
            font-size: 60px;
            font-weight: 700;
            color: #d81b60;
        }

        .meaning {
            font-size: 28px;
            font-weight: bold;
            color: #bf360c;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .game-item {
            background: #fff5f8;
            border: 2px solid #ffb6c1;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
        }

        .game-item.selected {
            background: #ffe082;
            border-color: #ffb300;
        }

        .game-item.matched {
            visibility: hidden;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            background: #eee;
            font-family: 'Gaegu', cursive;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="filter-container">
            <select id="chapter-select" onchange="changeCategory()">
                <option value="all">🌟 전체 보기</option>
                <option value="1">🌸 1과</option>
                <option value="2">🌸 2과</option>
                <option value="3">🌸 3과</option>
                <option value="4">🌸 4과</option>
                <option value="5">🌸 5과</option>
                <option value="6">🔄 1~5 복습</option>
                <option value="7">🌸 7과</option>
                <option value="8">🌸 8과</option>
                <option value="9">🌸 9과</option>
                <option value="10">🌸 10과</option>
                <option value="11">🌸 11과</option>
                <option value="12">🔄 7~11 복습</option>
            </select>
        </div>
        <div class="options-outer-container">
            <div class="toggle-group">
                <label><input type="checkbox" id="auto-tts" checked> 🔊 자동 발음</label>
            </div>
            <button class="game-trigger-btn" onclick="openGameModal()">🧩 매칭 게임</button>
        </div>
    </div>

    <div class="card-container">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face"><div class="hanzi" id="hanzi">로딩 중..</div></div>
            <div class="card-face card-back"><div class="meaning" id="meaning">뜻</div></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">👈 이전</button>
        <button onclick="nextCard()">다음 👉</button>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <h3 id="game-title">단어 짝 맞추기 🧩</h3>
            <div class="game-grid" id="game-grid-container"></div>
            <p id="game-msg"></p>
            <button onclick="document.getElementById('game-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/18D1sxEjb7qD4DudFmrZziQDZ0HK-F1V-8Z3V-9WxoDw/gviz/tq?tqx=out:csv';
        let totalData = [], filteredData = [], currentIndex = 0, selectedItems = [], matchedCount = 0;

        async function fetchData() {
            try {
                const res = await fetch(SPREADSHEET_URL);
                const text = await res.text();
                totalData = text.split('\n').slice(1).filter(l => l.trim()).map((line, i) => {
                    const row = line.split(',').map(s => s.replace(/"/g, ''));
                    return { id: i, chapter: row[1], hanzi: row[2], meaning: row[4] };
                });
                changeCategory();
            } catch (e) {
                console.error("데이터 로딩 실패:", e);
            }
        }

        function changeCategory() {
            const val = document.getElementById('chapter-select').value;
            filteredData = val === 'all' ? totalData : totalData.filter(d => d.chapter === val);
            currentIndex = 0;
            updateCard();
        }

        function updateCard() {
            const w = filteredData[currentIndex] || { hanzi: "데이터 없음", meaning: "없음" };
            document.getElementById('hanzi').textContent = w.hanzi;
            document.getElementById('meaning').textContent = w.meaning;
            document.getElementById('card').classList.remove('flipped');
        }

        function flipCard() {
            const card = document.getElementById('card');
            card.classList.toggle('flipped');
            if (card.classList.contains('flipped') && document.getElementById('auto-tts').checked) {
                const u = new SpeechSynthesisUtterance(document.getElementById('hanzi').textContent);
                u.lang = 'zh-CN';
                speechSynthesis.speak(u);
            }
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % filteredData.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + filteredData.length) % filteredData.length;
            updateCard();
        }

        function openGameModal() {
            matchedCount = 0;
            const container = document.getElementById('game-grid-container');
            const msg = document.getElementById('game-msg');
            container.innerHTML = '';
            msg.textContent = '짝을 모두 맞춰보세요! ✨';
            
            const gameData = filteredData.slice(0, 4);
            let items = [];
            gameData.forEach(d => {
                items.push({ id: d.id, text: d.hanzi, type: 'h' }, { id: d.id, text: d.meaning, type: 'm' });
            });
            items.sort(() => 0.5 - Math.random());
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'game-item';
                div.textContent = item.text;
                div.onclick = () => {
                    if (div.classList.contains('selected') || selectedItems.length >= 2) return;
                    div.classList.add('selected');
                    selectedItems.push({ div, id: item.id, type: item.type });
                    
                    if (selectedItems.length === 2) {
                        if (selectedItems[0].id === selectedItems[1].id && selectedItems[0].type !== selectedItems[1].type) {
                            selectedItems[0].div.classList.add('matched');
                            selectedItems[1].div.classList.add('matched');
                            matchedCount++;
                            selectedItems = [];
                            if (matchedCount === 4) msg.textContent = '🎉 성공! 완벽해요! 🥳';
                        } else {
                            setTimeout(() => {
                                selectedItems.forEach(s => s.div.classList.remove('selected'));
                                selectedItems = [];
                            }, 500);
                        }
                    }
                };
                container.appendChild(div);
            });
            document.getElementById('game-modal').style.display = 'flex';
        }
        fetchData();
    </script>
</body>
</html>
