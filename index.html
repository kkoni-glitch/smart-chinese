<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #ffeef2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            color: #5d4037;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-container {
            width: 380px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            position: relative;
            border-radius: 20px;
            border: 4px solid #b39ddb;
            background: white;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            padding: 25px;
            box-sizing: border-box;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            border-radius: 20px;
            border: 3px solid #ffb6c1;
            width: 400px;
            padding: 25px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .game-item {
            background-color: #fff5f8;
            border: 2px solid #ffb6c1;
            border-radius: 15px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        .game-item.selected {
            background-color: #ffe082;
            border-color: #ffb300;
        }

        .game-item.matched {
            visibility: hidden;
        }
    </style>
</head>

<body>

    <div class="header-container">
        <select id="chapter-select" onchange="changeCategory()">
            <option value="all">🌟 전체 보기</option>
        </select>
        <button class="game-trigger-btn" onclick="openGameModal()">🧩 매칭 게임</button>
    </div>

    <div class="card-container">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face card-front"><div id="hanzi">단어</div></div>
            <div class="card-face card-back"><div id="meaning">뜻</div></div>
        </div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <h3>🧩 단어 매칭 게임</h3>
            <div class="game-grid" id="game-grid-container"></div>
            <p id="game-status">짝을 맞추세요!</p>
            <button onclick="closeGame()">닫기</button>
        </div>
    </div>

    <script>
        let totalWordData = [], currentFilteredData = [], selectedGameItems = [], remainingGamePool = [];
        let currentIndex = 0;

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function closeGame() {
            document.getElementById('game-modal').style.display = 'none';
        }

        function openGameModal() {
            remainingGamePool = [...currentFilteredData];
            initMatchingGame();
            document.getElementById('game-modal').style.display = 'flex';
        }

        function initMatchingGame() {
            const g = document.getElementById('game-grid-container');
            g.innerHTML = '';
            
            let pieces = [];
            remainingGamePool.slice(0, 4).forEach(w => {
                pieces.push({id: w.id, text: w.hanzi, type: 'h'}, {id: w.id, text: w.meaning, type: 'm'});
            });
            pieces.sort(() => 0.5 - Math.random());

            pieces.forEach(p => {
                const div = document.createElement('div');
                div.className = 'game-item';
                div.textContent = p.text;
                
                div.onclick = () => {
                    if (div.classList.contains('selected') || div.classList.contains('matched') || selectedGameItems.length >= 2) {
                        return;
                    }
                    
                    div.classList.add('selected');
                    selectedGameItems.push({div, id: p.id, type: p.type});

                    if (selectedGameItems.length === 2) {
                        const [first, second] = selectedGameItems;
                        
                        if (first.id === second.id && first.type !== second.type) {
                            first.div.classList.add('matched');
                            second.div.classList.add('matched');
                            remainingGamePool = remainingGamePool.filter(w => w.id !== first.id);
                        } else {
                            // 틀리면 즉시 선택 해제
                            first.div.classList.remove('selected');
                            second.div.classList.remove('selected');
                        }
                        selectedGameItems = [];
                    }
                };
                g.appendChild(div);
            });
        }
    </script>
</body>
</html>
