<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <style>
        body { font-family: 'Gaegu', cursive; background-color: #ffeef2; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; color: #5d4037; }
        .card-container { width: 350px; height: 250px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card { width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; position: relative; border-radius: 20px; border: 4px solid #b39ddb; background: white; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; font-size: 30px; border-radius: 16px; }
        .card-back { transform: rotateY(180deg); }
        
        /* 진행 바 버튼 (클릭 확실하게 보장) */
        .progress-btn { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background-color: white; padding: 10px 20px; border-radius: 25px; border: 2px solid #ffb6c1; cursor: pointer; font-family: 'Gaegu', cursive; font-size: 16px; color: #c71585; }
        .progress-bar-bg { width: 100px; height: 10px; background-color: #e0e0e0; border-radius: 5px; overflow: hidden; pointer-events: none; }
        .progress-bar-fill { height: 100%; background-color: #ff69b4; width: 0%; pointer-events: none; }
        
        .controls { display: flex; gap: 10px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-family: 'Gaegu', cursive; font-size: 18px; }
        .autoplay-btn.active { background-color: #ffb300; color: white; }
        
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
        .modal-content { background-color: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face" id="front">한자</div>
            <div class="card-face card-back" id="back">뜻</div>
        </div>
    </div>

    <button class="progress-btn" onclick="openWordListModal()">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar-fill"></div></div>
        <div id="progress-text">0 / 0</div>
    </button>

    <div class="controls">
        <button id="autoplay-btn" class="autoplay-btn" onclick="toggleAutoplay()">⏱️ 자동 재생 (1.5초)</button>
    </div>

    <div id="word-list-modal" class="modal" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal-content">
            <input type="text" placeholder="검색" oninput="console.log(this.value)">
            <div>단어 목록이 여기에 표시됩니다.</div>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let data = [{h: "你好", m: "안녕"}, {h: "谢谢", m: "감사"}, {h: "再见", m: "안녕"}];
        let interval = null;

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
        function openWordListModal() { document.getElementById('word-list-modal').style.display = 'flex'; }

        function toggleAutoplay() {
            const btn = document.getElementById('autoplay-btn');
            const card = document.getElementById('card');
            if (interval) {
                clearInterval(interval);
                interval = null;
                btn.classList.remove('active');
            } else {
                btn.classList.add('active');
                interval = setInterval(() => {
                    if (!card.classList.contains('flipped')) {
                        card.classList.add('flipped');
                    } else {
                        card.classList.remove('flipped');
                        setTimeout(() => {
                            currentIndex = (currentIndex + 1) % data.length;
                            document.getElementById('front').textContent = data[currentIndex].h;
                            document.getElementById('back').textContent = data[currentIndex].m;
                        }, 500);
                    }
                }, 1500); // 1.5초 간격
            }
        }
    </script>
</body>
</html>
