<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <style>
        /* 검색창과 리스트 스타일 명시 */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 20px; height: 70vh; display: flex; flex-direction: column; }
        .search-box { padding: 10px; border: 2px solid #ffb6c1; border-radius: 15px; margin-bottom: 10px; font-family: inherit; }
        .word-list-container { overflow-y: auto; flex-grow: 1; }
        .word-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        
        /* 기존 스타일들 */
        body { font-family: sans-serif; background-color: #ffeef2; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card-container { width: 350px; height: 250px; background: white; border: 3px solid #b39ddb; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; margin: 20px; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .game-item { background: #fff5f8; border: 2px solid #ffb6c1; padding: 10px; cursor: pointer; text-align: center; border-radius: 10px; }
    </style>
</head>
<body>

    <select id="chapter-select" onchange="changeCategory()">
        <option value="all">전체 보기</option>
        <option value="1">1과</option>
    </select>
    
    <div class="card-container" id="card" onclick="flipCard()">
        <div id="hanzi" style="font-size: 50px;">로딩 중...</div>
        <div id="pinyin"></div>
        <div id="meaning"></div>
    </div>

    <div id="progress-text" onclick="openWordListModal()" style="cursor:pointer; color: blue; text-decoration: underline;">
        0 / 0
    </div>

    <button onclick="openGameModal()">🧩 매칭 게임</button>

    <div id="word-list-modal" class="modal">
        <div class="modal-content">
            <input type="text" id="search-input" class="search-box" placeholder="검색.." oninput="renderWordList()">
            <div id="word-list-container" class="word-list-container"></div>
            <button onclick="document.getElementById('word-list-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <div id="game-status">남은 카드: 0</div>
            <div class="game-grid" id="game-grid-container"></div>
            <button onclick="document.getElementById('game-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/18D1sxEjb7qD4DudFmrZziQDZ0HK-F1V-8Z3V-9WxoDw/gviz/tq?tqx=out:csv';
        let totalWordData = [], currentFilteredData = [], currentIndex = 0;

        async function loadWordData() {
            const res = await fetch(SPREADSHEET_URL);
            const text = await res.text();
            totalWordData = text.split('\n').slice(1).filter(l => l.trim()).map((line, i) => {
                const row = line.split(',').map(s => s.replace(/"/g, '').trim());
                return { id: i, chapter: row[1], hanzi: row[2], pinyin: row[3], meaning: row[4] };
            });
            changeCategory();
        }

        function changeCategory() {
            const val = document.getElementById('chapter-select').value;
            currentFilteredData = (val === "all") ? [...totalWordData] : totalWordData.filter(w => w.chapter === val);
            currentIndex = 0;
            updateCardContent();
        }

        function updateCardContent() {
            const w = currentFilteredData[currentIndex];
            if (!w) return;
            document.getElementById('hanzi').textContent = w.hanzi;
            document.getElementById('pinyin').textContent = w.pinyin;
            document.getElementById('meaning').textContent = w.meaning;
            document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${currentFilteredData.length}`;
        }

        function renderWordList() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('word-list-container');
            container.innerHTML = '';
            currentFilteredData.filter(w => w.hanzi.includes(q) || w.pinyin.includes(q) || w.meaning.includes(q)).forEach(w => {
                const div = document.createElement('div');
                div.className = 'word-item';
                div.innerHTML = `<span>${w.hanzi}</span><span>${w.meaning}</span>`;
                div.onclick = () => {
                    currentIndex = currentFilteredData.indexOf(w);
                    updateCardContent();
                    document.getElementById('word-list-modal').style.display = 'none';
                };
                container.appendChild(div);
            });
        }

        function openWordListModal() {
            renderWordList();
            document.getElementById('word-list-modal').style.display = 'flex';
        }

        function openGameModal() { /* ...생략 (이전 게임 로직) */ }

        loadWordData();
    </script>
</body>
</html>
