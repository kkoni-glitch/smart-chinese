<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 스마트 중국어 단어장 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #ffeef2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            color: #5d4037;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chapter-btn {
            background: white;
            border: 2px solid #ffb6c1;
            padding: 8px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            font-weight: bold;
            color: #d81b60;
        }

        .chapter-btn:hover {
            background: #ffe082;
        }

        .card-container {
            width: 350px;
            height: 250px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            position: relative;
            border-radius: 20px;
            border: 4px solid #b39ddb;
            box-shadow: 0 10px 20px rgba(179, 157, 219, 0.3);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            background-color: white;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fffdeb;
        }

        .hanzi { font-size: 60px; font-weight: 700; color: #d81b60; }
        .meaning { font-size: 28px; font-weight: bold; color: #bf360c; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
        .modal-content { background-color: white; border-radius: 20px; padding: 20px; width: 90%; max-width: 400px; text-align: center; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .game-item { background: #fff5f8; border: 2px solid #ffb6c1; border-radius: 10px; padding: 10px; cursor: pointer; font-size: 14px; }
        .game-item.selected { background: #ffe082; }
        .game-item.matched { visibility: hidden; }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="filter-container">
            <button class="chapter-btn" onclick="changeCategory('all')">🌟 전체 보기</button>
            <button class="chapter-btn" onclick="changeCategory('1')">🌸 1과</button>
            <button class="chapter-btn" onclick="changeCategory('2')">🌸 2과</button>
            <button class="chapter-btn" onclick="changeCategory('3')">🌸 3과</button>
            <button class="chapter-btn" onclick="changeCategory('4')">🌸 4과</button>
            <button class="chapter-btn" onclick="changeCategory('5')">🌸 5과</button>
            <button class="chapter-btn" onclick="changeCategory('6')">🔄 1~5 복습</button>
            <button class="chapter-btn" onclick="changeCategory('7')">🌸 7과</button>
            <button class="chapter-btn" onclick="changeCategory('8')">🌸 8과</button>
            <button class="chapter-btn" onclick="changeCategory('9')">🌸 9과</button>
            <button class="chapter-btn" onclick="changeCategory('10')">🌸 10과</button>
            <button class="chapter-btn" onclick="changeCategory('11')">🌸 11과</button>
            <button class="chapter-btn" onclick="changeCategory('12')">🔄 7~11 복습</button>
        </div>
        <div>
            <label><input type="checkbox" id="auto-tts" checked> 🔊 자동 발음</label>
            <button onclick="openGameModal()">🧩 매칭 게임</button>
        </div>
    </div>

    <div class="card-container">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face"><div class="hanzi" id="hanzi">로딩 중..</div></div>
            <div class="card-face card-back"><div class="meaning" id="meaning">뜻</div></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">👈 이전</button>
        <button onclick="nextCard()">다음 👉</button>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <h3>단어 짝 맞추기 🧩</h3>
            <div class="game-grid" id="game-grid-container"></div>
            <p id="game-msg"></p>
            <button onclick="document.getElementById('game-modal').style.display='none'">닫기</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/18D1sxEjb7qD4DudFmrZziQDZ0HK-F1V-8Z3V-9WxoDw/gviz/tq?tqx=out:csv';
        let totalData = [], filteredData = [], currentIndex = 0, selectedItems = [], matchedCount = 0;

        async function fetchData() {
            const res = await fetch(SPREADSHEET_URL);
            const text = await res.text();
            totalData = text.split('\n').slice(1).filter(l => l.trim()).map((line, i) => {
                const c = line.split(',').map(s => s.replace(/"/g, ''));
                return { id: i, chapter: c[1], hanzi: c[2], meaning: c[4] };
            });
            changeCategory('all');
        }

        function changeCategory(chapter) {
            filteredData = chapter === 'all' ? totalData : totalData.filter(d => d.chapter === chapter);
            currentIndex = 0;
            updateCard();
        }

        function updateCard() {
            const w = filteredData[currentIndex] || { hanzi: "없음", meaning: "데이터가 없습니다." };
            document.getElementById('hanzi').textContent = w.hanzi;
            document.getElementById('meaning').textContent = w.meaning;
            document.getElementById('card').classList.remove('flipped');
        }

        function flipCard() {
            const card = document.getElementById('card');
            if (card.classList.contains('flipped')) return;
            
            card.classList.add('flipped');
            if (document.getElementById('auto-tts').checked) {
                const u = new SpeechSynthesisUtterance(document.getElementById('hanzi').textContent);
                u.lang = 'zh-CN';
                u.onend = () => {
                    setTimeout(() => nextCard(), 1500);
                };
                speechSynthesis.speak(u);
            }
        }

        function nextCard() {
            if (filteredData.length > 0) {
                currentIndex = (currentIndex + 1) % filteredData.length;
                updateCard();
            }
        }

        function prevCard() {
            if (filteredData.length > 0) {
                currentIndex = (currentIndex - 1 + filteredData.length) % filteredData.length;
                updateCard();
            }
        }

        function openGameModal() {
            if (filteredData.length < 4) { alert("단어가 4개 이상 필요합니다!"); return; }
            matchedCount = 0;
            const container = document.getElementById('game-grid-container');
            container.innerHTML = '';
            const gameData = [...filteredData].sort(() => 0.5 - Math.random()).slice(0, 4);
            let items = [];
            gameData.forEach(d => {
                items.push({ id: d.id, text: d.hanzi, type: 'h' }, { id: d.id, text: d.meaning, type: 'm' });
            });
            items.sort(() => 0.5 - Math.random());
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'game-item'; div.textContent = item.text;
                div.onclick = () => {
                    if (div.classList.contains('selected') || selectedItems.length >= 2) return;
                    div.classList.add('selected'); selectedItems.push({ div, id: item.id, type: item.type });
                    if (selectedItems.length === 2) {
                        if (selectedItems[0].id === selectedItems[1].id && selectedItems[0].type !== selectedItems[1].type) {
                            selectedItems[0].div.classList.add('matched'); selectedItems[1].div.classList.add('matched');
                            matchedCount++; selectedItems = [];
                            if (matchedCount === 4) document.getElementById('game-msg').textContent = '🎉 성공! 🥳';
                        } else {
                            setTimeout(() => { selectedItems.forEach(s => s.div.classList.remove('selected')); selectedItems = []; }, 500);
                        }
                    }
                };
                container.appendChild(div);
            });
            document.getElementById('game-modal').style.display = 'flex';
        }
        fetchData();
    </script>
</body>
</html>
